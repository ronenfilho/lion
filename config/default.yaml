# Configuração Padrão - LION

# Projeto
project:
  name: "LION"
  version: "0.0.1"
  description: "Legal Interpretation and Official Norms - Assistente IRPF RAG"

# Embeddings
embeddings:
  model: "models/text-embedding-004"
  dimension: 768
  batch_size: 100
  normalize: true

# Vector Store
vector_store:
  type: "chromadb"  # chromadb | qdrant | faiss
  persist_directory: "./data/embeddings/chroma_db"
  collection_name: "irpf_2025"
  distance_metric: "cosine"

# Retrieval
retrieval:
  strategy: "hybrid"  # dense | hybrid
  top_k: 5
  similarity_threshold: 0.7
  hybrid_alpha: 0.7  # 70% dense, 30% sparse
  use_reranking: true
  reranker_model: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  reranker_top_k: 15

# Chunking
chunking:
  strategy: "structural"  # fixed | structural | qa
  max_chunk_size: 800
  overlap: 0
  add_context_window: true

# Generation
generation:
  model: "gemini-2.0-flash-exp"
  temperature: 0.2
  top_p: 0.9
  max_tokens: 800
  presence_penalty: 0.1
  frequency_penalty: 0.1
  stop_sequences: ["###", "Contexto:"]

# Guardrails
guardrails:
  input_validation: true
  output_validation: true
  pii_detection: true
  prompt_injection_detection: true
  min_query_length: 10
  max_query_length: 500
  min_response_length: 50

# Cache
cache:
  enabled: true
  type: "semantic"  # semantic | exact
  similarity_threshold: 0.95
  ttl: 3600  # seconds
  max_size: 1000

# Monitoring
monitoring:
  enabled: true
  log_level: "INFO"
  log_format: "json"
  metrics_enabled: true
  tracing_enabled: false

# Evaluation
evaluation:
  runs_per_query: 5
  metrics:
    - "bertscore"
    - "faithfulness"
    - "answer_relevancy"
  bertscore_model: "microsoft/deberta-xlarge-mnli"

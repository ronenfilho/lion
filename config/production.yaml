# Configuração de Produção

# Vector Store otimizado
vector_store:
  type: "qdrant"
  host: "localhost"
  port: 6333

# Cache com Redis
cache:
  enabled: true
  type: "redis"
  host: "localhost"
  port: 6379
  ttl: 7200

# Monitoring completo
monitoring:
  enabled: true
  log_level: "WARNING"
  metrics_enabled: true
  tracing_enabled: true
  
# Rate limiting
rate_limiting:
  enabled: true
  requests_per_minute: 10
  requests_per_hour: 100
